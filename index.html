<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>نظام إدارة المخزون - fantsyiq</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#2563EB;--pri-l:#EFF6FF;--pri-d:#1D4ED8;
  --ok:#16a34a;--ok-l:#dcfce7;
  --warn:#d97706;--warn-l:#fef3c7;
  --err:#dc2626;--err-l:#fee2e2;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --orange:#ea580c;--orange-l:#fff7ed;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;
  --w:#fff;--sw:250px;--r:10px;--rl:16px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shl:0 10px 25px rgba(0,0,0,.12),0 4px 6px rgba(0,0,0,.06);
}
body{font-family:'Tajawal',sans-serif;background:var(--g50);color:var(--g800);font-size:15px;line-height:1.6;min-height:100vh;-webkit-tap-highlight-color:transparent}
#root{min-height:100vh;display:flex;flex-direction:column}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2563EB,#1D4ED8)}
.loader-box{background:#fff;border-radius:20px;padding:2.5rem 3rem;text-align:center;box-shadow:var(--shl)}
.spin{width:48px;height:48px;border:4px solid var(--g200);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.loader-box h3{font-size:18px;font-weight:700;color:var(--g800);margin-bottom:4px}
.loader-box p{font-size:13px;color:var(--g500)}

/* Auth */
.auth{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2563EB 0%,#1e40af 100%);padding:1rem}
.auth-card{background:var(--w);border-radius:var(--rl);padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shl)}
.auth-logo{text-align:center;margin-bottom:1.75rem}
.auth-logo .li{width:68px;height:68px;background:var(--pri-l);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:32px}
.auth-logo h1{font-size:22px;font-weight:800;color:var(--g800)}
.auth-logo p{color:var(--g500);font-size:13px;margin-top:3px}
.online-pill{display:inline-flex;align-items:center;gap:5px;background:var(--ok-l);color:var(--ok);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-top:8px}
.dot{width:7px;height:7px;background:var(--ok);border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Forms */
.fg{margin-bottom:.85rem}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--g700);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:14px;color:var(--g800);background:var(--w);transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:72px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap;touch-action:manipulation}
.btn:disabled{opacity:.55;cursor:not-allowed}
.bp{background:var(--pri);color:#fff}.bp:hover:not(:disabled){background:var(--pri-d)}
.bo{background:transparent;color:var(--pri);border:1.5px solid var(--pri)}.bo:hover{background:var(--pri-l)}
.be{background:var(--err-l);color:var(--err)}.be:hover{background:#fecaca}
.bok{background:var(--ok-l);color:var(--ok)}.bok:hover{background:#bbf7d0}
.bfull{width:100%;padding:12px}
.bsm{padding:6px 13px;font-size:13px}
.bicon{padding:8px;border-radius:8px;background:var(--g100);color:var(--g600);border:none;cursor:pointer;transition:background .15s;font-size:15px;touch-action:manipulation;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center}
.bicon:hover{background:var(--g200)}

/* ══ LAYOUT - WHITE BOX FIX ══
   sidebar: z-index 400
   overlay: z-index 390 (below sidebar, above everything else)
   topbar:  z-index 100 (below overlay so it gets covered when sidebar opens)
   modal:   z-index 1000
*/
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--w);border-left:1px solid var(--g200);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:400;transition:transform .3s ease;box-shadow:var(--sh)}
.sb-head{padding:1.2rem 1rem;border-bottom:1px solid var(--g200);flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo .sli{width:38px;height:38px;background:var(--pri);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.sb-logo .slt{font-size:15px;font-weight:800;color:var(--g800);line-height:1.2}
.sb-logo .sls{font-size:11px;color:var(--g500)}
.sb-nav{flex:1;padding:.75rem 0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ni{display:flex;align-items:center;gap:10px;padding:12px 1rem;cursor:pointer;transition:all .18s;color:var(--g600);font-size:14px;font-weight:500;border-radius:9px;margin:1px 8px;touch-action:manipulation}
.ni:hover,.ni:active{background:var(--g100);color:var(--g800)}
.ni.act{background:var(--pri-l);color:var(--pri);font-weight:700}
.ni .nic{width:22px;text-align:center;font-size:17px;flex-shrink:0}
.sb-foot{padding:.9rem;border-top:1px solid var(--g200);flex-shrink:0}
.ucard{display:flex;align-items:center;gap:9px;padding:8px;border-radius:var(--r);background:var(--g50);margin-bottom:6px}
.av{border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.uname{font-size:13px;font-weight:700;color:var(--g800)}
.urole{font-size:11px;color:var(--g500)}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;border-radius:8px}
.son{color:var(--ok);background:var(--ok-l)}.soff{color:var(--warn);background:var(--warn-l)}
.main{flex:1;margin-right:var(--sw);display:flex;flex-direction:column;min-height:100vh}
/* topbar z-index 100 — below overlay so sidebar covers it on mobile */
.topbar{background:var(--w);border-bottom:1px solid var(--g200);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.topbar h2{font-size:18px;font-weight:800;color:var(--g800)}
.pcontent{padding:1.5rem;flex:1}
/* overlay covers full screen including topbar */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:390;touch-action:none;-webkit-tap-highlight-color:transparent}
.ovl.show{display:block}
.mtog{display:none;background:none;border:none;font-size:26px;cursor:pointer;color:var(--g700);padding:4px 6px;min-width:40px;min-height:40px;align-items:center;justify-content:center;touch-action:manipulation;position:relative;z-index:101}

/* Cards */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1rem;margin-bottom:1.5rem}
.sc{background:var(--w);border-radius:var(--rl);padding:1.2rem;border:1px solid var(--g200);box-shadow:var(--sh)}
.sc .sl{font-size:12px;color:var(--g500);font-weight:500;margin-bottom:5px}
.sc .sv{font-size:22px;font-weight:800;color:var(--g800)}
.sc .sic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.card{background:var(--w);border-radius:var(--rl);border:1px solid var(--g200);padding:1.25rem;box-shadow:var(--sh)}
.ctitle{font-size:15px;font-weight:700;color:var(--g800);margin-bottom:1rem}

/* Table */
.tw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--g200);box-shadow:var(--sh);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th{background:var(--g50);padding:10px 14px;text-align:right;font-size:12px;font-weight:700;color:var(--g500);white-space:nowrap;border-bottom:1px solid var(--g200)}
td{padding:11px 14px;border-bottom:1px solid var(--g100);font-size:14px;color:var(--g700);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--g50)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.bg{background:var(--ok-l);color:var(--ok)}
.br{background:var(--err-l);color:var(--err)}
.by{background:var(--warn-l);color:var(--warn)}
.bb{background:var(--pri-l);color:var(--pri)}
.bpu{background:var(--purple-l);color:var(--purple)}
.bor{background:var(--orange-l);color:var(--orange)}
.st-sold{background:#dcfce7;color:#15803d}
.st-returned{background:#fee2e2;color:#dc2626}
.st-available{background:#e0f2fe;color:#0369a1}
.st-reserved{background:var(--orange-l);color:var(--orange)}
.st-not-delivered{background:#fef9c3;color:#854d0e}
.st-delivered{background:#d1fae5;color:#065f46}

/* Search */
.sbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.siw{position:relative;flex:1;min-width:150px}
.siw input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:14px;background:var(--w)}
.siw input:focus{outline:none;border-color:var(--pri)}
.sic2{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:15px;pointer-events:none}
.fsel{padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:13px;color:var(--g700);background:var(--w);cursor:pointer}

/* Modal - z-index 1000 above everything */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
.modal{background:var(--w);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:620px;max-height:95vh;overflow-y:auto;box-shadow:var(--shl);-webkit-overflow-scrolling:touch}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.5rem;border-bottom:1px solid var(--g200);position:sticky;top:0;background:var(--w);z-index:2}
.mhead h3{font-size:16px;font-weight:800}
.mbody{padding:1.25rem 1.5rem}
.mfoot{padding:.9rem 1.5rem;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--w)}

/* Product search dropdown */
.psearch-wrap{position:relative}
.psearch-drop{position:absolute;top:100%;right:0;left:0;background:var(--w);border:1.5px solid var(--pri);border-top:none;border-radius:0 0 var(--r) var(--r);max-height:200px;overflow-y:auto;z-index:50;box-shadow:var(--shl)}
.psearch-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:center;gap:8px}
.psearch-item:hover,.psearch-item:active{background:var(--pri-l)}
.psearch-item:last-child{border-bottom:none}
.psearch-item.disabled{opacity:.45;cursor:not-allowed;background:var(--g50)}

/* Product img */
.pimg{width:44px;height:44px;border-radius:9px;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:21px;border:1px solid var(--g200);overflow:hidden;flex-shrink:0}
.pimg img{width:100%;height:100%;object-fit:cover}
.iupload{border:2px dashed var(--g300);border-radius:var(--r);padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s;font-size:13px;color:var(--g500)}
.iupload:hover{border-color:var(--pri);background:var(--pri-l)}

/* Alerts */
.al{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border-radius:var(--r);margin-bottom:1rem;font-size:14px}
.al-w{background:var(--warn-l);color:var(--warn)}
.al-ok{background:var(--ok-l);color:var(--ok)}
.al-e{background:var(--err-l);color:var(--err)}
.al-i{background:var(--pri-l);color:var(--pri)}
.al-or{background:var(--orange-l);color:var(--orange)}

/* Mini chart */
.mchart{display:flex;align-items:flex-end;gap:4px;height:56px}
.mbar{background:var(--pri-l);border-radius:3px 3px 0 0;flex:1;min-width:8px;transition:background .2s}
.mbar:hover{background:var(--pri)}

/* Misc */
.empty{text-align:center;padding:3rem 1rem;color:var(--g400)}
.empty .ei{font-size:44px;margin-bottom:.75rem}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--g100);border-radius:20px;font-size:12px;color:var(--g600)}
.ca{background:var(--purple-l);color:var(--purple)}
.ce{background:var(--pri-l);color:var(--pri)}
.ppos{color:var(--ok);font-weight:700}
.pneg{color:var(--err);font-weight:700}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--g800);color:#fff;padding:10px 22px;border-radius:var(--r);font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shl)}
.toast.show{opacity:1}
.divider{border-top:2px dashed var(--g200);margin:.75rem 0 1rem;padding-top:1rem}
.item-list{background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);overflow:hidden}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--g200);font-size:13px;gap:8px}
.item-row:last-child{border-bottom:none}
.item-total{display:flex;justify-content:space-between;padding:9px 12px;font-weight:700;font-size:14px;background:var(--pri-l);color:var(--pri)}
.weight-calc{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:12px 14px;margin-bottom:.85rem}
.weight-calc .wval{font-size:16px;font-weight:800;color:var(--pri)}
.res-card{background:var(--w);border-radius:var(--rl);border:1px solid var(--g200);padding:1rem;margin-bottom:.75rem;box-shadow:var(--sh);display:flex;flex-direction:column;gap:8px}
.res-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.res-card-title{font-weight:700;font-size:15px;color:var(--g800)}
.res-card-sub{font-size:13px;color:var(--g500);margin-top:2px}
.res-actions{display:flex;gap:6px;flex-shrink:0}

/* Responsive */
@media(max-width:1024px){
  .sidebar{transform:translateX(110%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0}
  .mtog{display:inline-flex}
}
@media(max-width:768px){
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .pcontent{padding:1rem}
  .fr{grid-template-columns:1fr}
  .modal{max-height:92vh}
  table{min-width:600px}
}
@media(max-width:480px){.sgrid{grid-template-columns:1fr 1fr}}
</style>

<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,doc,onSnapshot,addDoc,setDoc,updateDoc,deleteDoc,serverTimestamp,writeBatch}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyBpwbt72bahIRzjnXzfTQzXi00SLXH2FGc",authDomain:"fantsyiq-823b8.firebaseapp.com",projectId:"fantsyiq-823b8",storageBucket:"fantsyiq-823b8.firebasestorage.app",messagingSenderId:"783196225894",appId:"1:783196225894:web:b51eb0693120735dcb08a7"};
const db=getFirestore(initializeApp(FB));
const COLS={users:'users',products:'products',customers:'customers',transactions:'transactions',reservations:'reservations'};

// سعر الغرام = 9 دينار (1 كغ = 1000 غرام × 9 = 9000)
const PRICE_PER_GRAM=9;

const INIT_USERS=[
  {_id:'u1',name:'كرم',email:'karam@fantsyiq.com',password:'karam123',role:'admin',phone:''},
  {_id:'u2',name:'سيف',email:'saif@fantsyiq.com',password:'saif123',role:'employee',phone:''},
  {_id:'u3',name:'بهاء',email:'bahaa@fantsyiq.com',password:'bahaa123',role:'employee',phone:''},
  {_id:'u4',name:'عمرو',email:'amro@fantsyiq.com',password:'amro123',role:'employee',phone:''},
];

const fsAdd=(col,d)=>addDoc(collection(db,col),{...d,_ts:serverTimestamp()});
const fsSet=(col,id,d)=>setDoc(doc(db,col,id),{...d,_ts:serverTimestamp()},{merge:true});
const fsUp=(col,id,d)=>updateDoc(doc(db,col,id),d);
const fsDel=(col,id)=>deleteDoc(doc(db,col,id));

async function seed(){
  const b=writeBatch(db);
  for(const u of INIT_USERS){const{_id,...d}=u;b.set(doc(db,COLS.users,_id),d,{merge:true})}
  await b.commit();
}

const{useState,useEffect,useRef,createElement:h,Fragment}=React;

function useCol(col){
  const[data,setData]=useState(null);
  useEffect(()=>onSnapshot(collection(db,col),snap=>{
    setData(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a._ts?.seconds||0)-(b._ts?.seconds||0)));
  }),[col]);
  return data;
}

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;
  el.style.background=type==='err'?'#dc2626':type==='ok'?'#16a34a':'#1f2937';
  el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2800);
}

const fmtN=n=>Number(n||0).toLocaleString('ar-IQ');
const fmtD=d=>{if(!d)return'-';try{return new Date(d).toLocaleDateString('ar-IQ')}catch{return d}};
const today=()=>new Date().toISOString().slice(0,10);
const STATUS_L={sold:'مباع',returned:'مُرجَّع',available:'متوفر',reserved:'محجوز',not_delivered:'غير موصل',delivered:'تم التوصيل'};
const STATUS_C={sold:'st-sold',returned:'st-returned',available:'st-available',reserved:'st-reserved',not_delivered:'st-not-delivered',delivered:'st-delivered'};

// ══ MODAL ══
function Modal({title,onClose,children,footer}){
  return h('div',{className:'movl',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal'},
      h('div',{className:'mhead'},h('h3',null,title),h('button',{className:'bicon',onClick:onClose},'✕')),
      h('div',{className:'mbody'},children),
      footer&&h('div',{className:'mfoot'},footer)
    )
  );
}
function Confirm({msg,onOk,onCancel,busy}){
  return h(Modal,{title:'تأكيد',onClose:onCancel,
    footer:h(Fragment,null,h('button',{className:'btn be',onClick:onOk,disabled:busy},busy?'...':'حذف'),h('button',{className:'btn bo',onClick:onCancel},'إلغاء'))
  },h('p',{style:{fontSize:'15px',lineHeight:'1.8'}},msg));
}

// ══ PRODUCT SEARCH ══
function ProductSearch({products,value,onChange,placeholder}){
  const[q,setQ]=useState('');
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  const sel=products.find(p=>p.id===value);
  useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener('mousedown',fn);document.addEventListener('touchstart',fn);
    return()=>{document.removeEventListener('mousedown',fn);document.removeEventListener('touchstart',fn)};
  },[]);
  const filtered=products.filter(p=>!q||p.name?.includes(q)||p.desc?.includes(q));
  return h('div',{className:'psearch-wrap',ref},
    h('input',{
      value:open?q:(sel?`${!sel.img?.startsWith('data:')?sel.img+' ':''}${sel.name} — متاح: ${sel.qty}`:''),
      onChange:e=>{setQ(e.target.value);if(!open)setOpen(true)},
      onFocus:()=>{setQ('');setOpen(true)},
      placeholder:placeholder||'ابحث عن منتج...',
      style:{width:'100%',padding:'10px 14px',border:'1.5px solid var(--g200)',borderRadius:open?'var(--r) var(--r) 0 0':'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'14px',background:'var(--w)'}
    }),

function CustomerSearch({customers,value,onChange}){

// ══ DASHBOARD ══
function Dashboard({products:P,transactions:T,customers:C,reservations:R}){
  P=P||[];T=T||[];C=C||[];R=R||[];
  const sales=T.filter(t=>t.type==='sale'&&t.status!=='returned');
  const revenue=sales.reduce((s,t)=>s+(t.items||[]).reduce((ss,i)=>ss+i.qty*i.unitPrice,0),0);
  const totalQty=P.reduce((s,p)=>s+(p.qty||0),0);
  const outStock=P.filter(p=>p.qty===0);
  const lowStock=P.filter(p=>p.qty>0&&p.qty<=5);
  const activeRes=R.filter(r=>r.status==='active');
  let profit=0;
  sales.forEach(t=>(t.items||[]).forEach(i=>{const p=P.find(x=>x.id===i.productId);if(p)profit+=i.qty*(i.unitPrice-p.buyPrice)}));
  const bars=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=d.toISOString().slice(0,10);return sales.filter(t=>t.date===ds).reduce((s,t)=>s+(t.items||[]).reduce((ss,i)=>ss+i.qty*i.unitPrice,0),0)});
  const mb=Math.max(...bars,1);
  const recent=T.slice().reverse().slice(0,6);
  // ── القطع الراكدة ──
  const now=Date.now();
  const DAYS7=7*24*60*60*1000;const DAYS10=10*24*60*60*1000;
  const lastSaleMap={};
  sales.forEach(t=>{(t.items||[]).forEach(i=>{const d=t.date?new Date(t.date).getTime():0;if(!lastSaleMap[i.productId]||d>lastSaleMap[i.productId])lastSaleMap[i.productId]=d})});
  // ── الموقت يبدأ من تاريخ الإضافة إذا ما انباع، أو من آخر بيع ──
  const getStartDate=p=>{const lastSale=lastSaleMap[p.id];if(lastSale)return lastSale;if(p._ts?.seconds)return p._ts.seconds*1000;if(p._ts?.toMillis)return p._ts.toMillis();return null};
  const slowMoving=P.filter(p=>{if(p.qty<=0)return false;const s=getStartDate(p);return s&&(now-s)>=DAYS7});
  const slow7=slowMoving.filter(p=>{const s=getStartDate(p);return s&&(now-s)<DAYS10});
  const slow10=slowMoving.filter(p=>{const s=getStartDate(p);return s&&(now-s)>=DAYS10});
  // ── الوزن الكلي وقيمة الشراء الكلية ──
  const totalWeight=P.reduce((s,p)=>s+(p.weight||0)*(p.qty||0),0);
  const totalBuyValue=P.reduce((s,p)=>s+(p.buyPrice||0)*(p.qty||0),0);
  const[showSlow,setShowSlow]=useState(false);
  const SC=(l,v,ic,bg)=>h('div',{className:'sc',key:l},h('div',{className:'sic',style:{background:bg}},ic),h('div',{className:'sl'},l),h('div',{className:'sv',style:{fontSize:String(v).length>10?'14px':'22px'}},v));
  return h('div',null,
    outStock.length>0&&h('div',{className:'al al-e'},`⚠️ ${outStock.length} منتج نفد من المخزون`),
    lowStock.length>0&&h('div',{className:'al al-w'},`⚠️ ${lowStock.length} منتج بكمية منخفضة`),
    activeRes.length>0&&h('div',{className:'al al-or'},`🔖 ${activeRes.length} حجز نشط بانتظار الاستلام`),
    slow10.length>0&&h('div',{className:'al al-e',style:{cursor:'pointer',alignItems:'center'},onClick:()=>setShowSlow(s=>!s)},
      `🕐 ${slow10.length} منتج ما انباع أكثر من 10 أيام — اضغط للتفاصيل`
    ),
    slow7.length>0&&h('div',{className:'al al-w',style:{cursor:'pointer',alignItems:'center'},onClick:()=>setShowSlow(s=>!s)},
      `⏳ ${slow7.length} منتج ما انباع من 7-10 أيام — اضغط للتفاصيل`
    ),
    showSlow&&slowMoving.length>0&&h('div',{className:'card',style:{marginBottom:'1rem',border:'2px solid var(--warn)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
        h('div',{className:'ctitle',style:{margin:0}},'🕐 القطع الراكدة'),
        h('button',{className:'bicon',onClick:()=>setShowSlow(false)},'✕')
      ),
      slowMoving.map(p=>{
        const startDate=getStartDate(p);
        const hasSale=!!lastSaleMap[p.id];
        const days=startDate?Math.floor((now-startDate)/86400000):null;
        const isOld=startDate&&(now-startDate)>=DAYS10;
        return h('div',{key:p.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--g100)',fontSize:'13px'}},
          h('div',null,
            h('div',{style:{fontWeight:600}},p.name),
            h('div',{style:{fontSize:'12px',color:'var(--g500)'}},`كمية: ${p.qty} — ${hasSale?'آخر بيع: '+days+' يوم':'منذ الإضافة: '+days+' يوم'}`)
          ),
          h('span',{className:`badge ${isOld?'br':'by'}`},days?`${days} يوم`:'—')
        );
      })
    ),
    h('div',{className:'sgrid'},
      SC('المنتجات',P.length,'📦','#EFF6FF'),
      SC('وحدات متاحة',totalQty,'🏪','#dcfce7'),
      SC('الوزن الكلي للمخزون',fmtN(Math.round(totalWeight))+' غ','⚖️','#f0fdf4'),
      SC('قيمة الشراء الكلية','IQD '+fmtN(totalBuyValue),'🏷️','#fdf4ff'),
      SC('المبيعات','IQD '+fmtN(revenue),'💰','#EFF6FF'),
      SC('الأرباح','IQD '+fmtN(profit),'📈',profit>=0?'#dcfce7':'#fee2e2'),
      SC('العملاء',C.length,'👥','#ede9fe'),
      SC('الحجوزات',activeRes.length,'🔖','#fff7ed'),
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}},
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'المبيعات — آخر 7 أيام'),
        h('div',{className:'mchart'},bars.map((v,i)=>h('div',{key:i,className:'mbar',style:{height:Math.max(5,(v/mb)*52)+'px',background:v?'var(--pri)':'var(--g200)'}})))
      ),
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'تنبيهات المخزون'),
        outStock.length===0&&lowStock.length===0
          ?h('p',{style:{color:'var(--g400)',fontSize:'14px'}},'✅ كل المنتجات بمستويات جيدة')
          :[...outStock,...lowStock].slice(0,6).map(p=>h('div',{key:p.id,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--g100)',fontSize:'13px'}},
            h('span',null,p.name),h('span',{className:`badge ${p.qty===0?'br':'by'}`},p.qty===0?'نفد':'⚠ '+p.qty)
          ))
      )
    ),
    h('div',{className:'card'},
      h('div',{className:'ctitle'},'آخر المعاملات'),
      h('div',{className:'tw'},
        h('table',null,
          h('thead',null,h('tr',null,['النوع','العميل','المنتجات','الإجمالي','الحالة','التاريخ'].map(c=>h('th',{key:c},c)))),
          h('tbody',null,recent.length===0
            ?h('tr',null,h('td',{colSpan:6},h('div',{className:'empty'},h('div',{className:'ei'},'💳'),'لا توجد معاملات')))
            :recent.map(t=>{
              const cu=C.find(x=>x.id===t.customerId);
              const tot=(t.items||[]).reduce((s,i)=>s+i.qty*i.unitPrice,0);
              return h('tr',{key:t.id},
                h('td',null,h('span',{className:`badge ${t.type==='sale'?'bg':'bb'}`},t.type==='sale'?'بيع':'شراء')),
                h('td',null,cu?.name||'-'),
                h('td',null,`${(t.items||[]).length} منتج`),
                h('td',null,'IQD '+fmtN(tot)),
                h('td',null,t.status?h('span',{className:`badge ${STATUS_C[t.status]||'bb'}`},STATUS_L[t.status]||t.status):'-'),
                h('td',null,fmtD(t.date))
              );
            })
          )
        )
      )
    )
  );
}

// ══ CUSTOMERS ══
function Customers({customers:C,transactions:T,products:P}){
  C=C||[];T=T||[];P=P||[];
  const[search,setSearch]=useState('');
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[busy,setBusy]=useState(false);
  const blank={name:'',phone:'',address:'',purchaseItems:[]};
  const[form,setForm]=useState(blank);
  const[selPid,setSelPid]=useState('');
  const[selQty,setSelQty]=useState(1);

  const list=C.filter(c=>c.name?.includes(search)||c.phone?.includes(search)||c.address?.includes(search));

  const addItem=()=>{
    if(!selPid){toast('اختر منتجاً','err');return}
    const qty=+selQty;if(qty<1){toast('الكمية 1+','err');return}
    const p=P.find(x=>x.id===selPid);if(!p)return;
    if(p.qty<qty){toast(`المتوفر من "${p.name}" هو ${p.qty} فقط`,'err');return}
    setForm(prev=>{
      const ex=prev.purchaseItems.find(i=>i.productId===selPid);
      if(ex){const nq=ex.qty+qty;if(p.qty<nq){toast('الكمية تتجاوز المتوفر','err');return prev}return{...prev,purchaseItems:prev.purchaseItems.map(i=>i.productId===selPid?{...i,qty:nq}:i)}}
      return{...prev,purchaseItems:[...prev.purchaseItems,{productId:selPid,qty,unitPrice:p.sellPrice,pname:p.name,buyPrice:p.buyPrice}]};
    });
    setSelPid('');setSelQty(1);
  };
  const removeItem=pid=>setForm(prev=>({...prev,purchaseItems:prev.purchaseItems.filter(i=>i.productId!==pid)}));

  const save=async()=>{
    if(!form.name?.trim()){toast('يرجى إدخال اسم العميل','err');return}
    setBusy(true);
    try{
      const cd={name:form.name,phone:form.phone||'',address:form.address||''};
      if(modal==='edit'){await fsSet(COLS.customers,form._id,cd);toast('✅ تم التعديل','ok')}
      else{
        const ref=await fsAdd(COLS.customers,cd);const cid=ref.id;
        if(form.purchaseItems.length>0){
          await fsAdd(COLS.transactions,{type:'sale',customerId:cid,date:today(),note:'عند إضافة العميل',status:'sold',items:form.purchaseItems});
          for(const item of form.purchaseItems){const p=P.find(x=>x.id===item.productId);if(p)await fsUp(COLS.products,item.productId,{qty:Math.max(0,p.qty-item.qty)})}
          toast(`✅ تم إضافة العميل و ${form.purchaseItems.length} منتجات`,'ok');
        }else{toast('✅ تم إضافة العميل','ok')}
      }
      setModal(null);
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };
  const del=async id=>{setBusy(true);try{await fsDel(COLS.customers,id);toast('تم الحذف');setConfirm(null)}catch(e){toast('خطأ: '+e.message,'err')}setBusy(false)};
  const cnt=id=>T.filter(t=>t.customerId===id).length;
  const tot=id=>T.filter(t=>t.customerId===id&&t.type==='sale').reduce((s,t)=>s+(t.items||[]).reduce((ss,i)=>ss+i.qty*i.unitPrice,0),0);
  const bill=form.purchaseItems.reduce((s,i)=>s+i.qty*i.unitPrice,0);

  return h('div',null,
    h('div',{className:'sbar'},
      h('div',{className:'siw'},h('span',{className:'sic2'},'🔍'),h('input',{placeholder:'بحث...',value:search,onChange:e=>setSearch(e.target.value)})),
      h('button',{className:'btn bp',onClick:()=>{setForm(blank);setSelPid('');setSelQty(1);setModal('add')}},'➕ عميل')
    ),
    h('div',{className:'tw'},
      h('table',null,
        h('thead',null,h('tr',null,['العميل','الهاتف','العنوان','المعاملات','الإجمالي','إجراء'].map(c=>h('th',{key:c},c)))),
        h('tbody',null,list.length===0
          ?h('tr',null,h('td',{colSpan:6},h('div',{className:'empty'},h('div',{className:'ei'},'👥'),'لا توجد عملاء')))
          :list.map(c=>h('tr',{key:c.id},
            h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'9px'}},
              h('div',{className:'av',style:{width:'34px',height:'34px',fontSize:'14px'}},c.name?.[0]||'؟'),
              h('span',{style:{fontWeight:700}},c.name)
            )),
            h('td',null,c.phone||'-'),
            h('td',null,c.address?c.address.slice(0,25)+(c.address.length>25?'…':''):'-'),
            h('td',null,cnt(c.id)),
            h('td',null,'IQD '+fmtN(tot(c.id))),
            h('td',null,h('div',{style:{display:'flex',gap:'5px'}},
              h('button',{className:'bicon',onClick:()=>{setForm({name:c.name,phone:c.phone||'',address:c.address||'',purchaseItems:[],_id:c.id});setModal('edit')}},'✏️'),
              h('button',{className:'bicon',style:{color:'var(--err)'},onClick:()=>setConfirm(c.id)},'🗑️')
            ))
          ))
        )
      )
    ),
    modal&&h(Modal,{title:modal==='add'?'إضافة عميل':'تعديل العميل',onClose:()=>setModal(null),
      footer:h(Fragment,null,h('button',{className:'btn bp',onClick:save,disabled:busy},busy?'...':'💾 حفظ'),h('button',{className:'btn bo',onClick:()=>setModal(null)},'إلغاء'))
    },
      h('div',{className:'fr'},
        h('div',{className:'fg'},h('label',null,'الاسم *'),h('input',{value:form.name,onChange:e=>setForm(p=>({...p,name:e.target.value})),autoFocus:true})),
        h('div',{className:'fg'},h('label',null,'الهاتف'),h('input',{value:form.phone,onChange:e=>setForm(p=>({...p,phone:e.target.value})),type:'tel'}))
      ),
      h('div',{className:'fg'},h('label',null,'العنوان'),h('input',{value:form.address,onChange:e=>setForm(p=>({...p,address:e.target.value})),placeholder:'مثال: الموصل، حي النور'})),
      modal==='add'&&h('div',{className:'divider'},
        h('div',{style:{fontWeight:700,fontSize:'14px',color:'var(--g700)',marginBottom:'12px'}},'🛒 المنتجات المشتراة (اختياري)'),
        h('div',{className:'fg'},h('label',null,'ابحث عن منتج'),h(ProductSearch,{products:P,value:selPid,onChange:setSelPid})),
        h('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'12px'}},
          h('div',{style:{width:'90px'}},h('label',{style:{fontSize:'12px',color:'var(--g500)',display:'block',marginBottom:'4px'}},'الكمية'),h('input',{type:'number',min:1,value:selQty,onChange:e=>setSelQty(e.target.value),style:{width:'100%',padding:'9px 8px',border:'1.5px solid var(--g200)',borderRadius:'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'13px',textAlign:'center'}})),
          h('button',{className:'btn bp bsm',onClick:addItem,style:{paddingTop:'10px',paddingBottom:'10px',flex:1}},'+ أضف')
        ),
        form.purchaseItems.length>0
          ?h('div',{className:'item-list'},
            form.purchaseItems.map(item=>h('div',{key:item.productId,className:'item-row'},
              h('span',null,h('strong',null,item.pname),' × ',item.qty),
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('span',{style:{color:'var(--pri)',fontWeight:700}},'IQD '+fmtN(item.qty*item.unitPrice)),
                h('button',{className:'bicon',style:{padding:'3px 6px',color:'var(--err)',fontSize:'12px'},onClick:()=>removeItem(item.productId)},'✕')
              )
            )),
            h('div',{className:'item-total'},h('span',null,'إجمالي الفاتورة'),h('span',null,'IQD '+fmtN(bill)))
          )
          :h('p',{style:{fontSize:'12px',color:'var(--g400)',textAlign:'center',padding:'8px'}},'لم تُضف منتجات بعد')
      )
    ),
    confirm&&h(Confirm,{msg:'هل تريد حذف هذا العميل؟',busy,onOk:()=>del(confirm),onCancel:()=>setConfirm(null)})
  );
}

// ══ TRANSACTIONS ══
function Transactions({transactions:T,products:P,customers:C}){
  T=T||[];P=P||[];C=C||[];
  const[filter,setFilter]=useState('all');
  const[stFilter,setStFilter]=useState('all');
  const[modal,setModal]=useState(false);
  const[detailModal,setDetailModal]=useState(null);
  const[editModal,setEditModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[busy,setBusy]=useState(false);
  const[txType,setTxType]=useState('sale');
  const[txCustomer,setTxCustomer]=useState('');
  const[txDate,setTxDate]=useState(today());
  const[txNote,setTxNote]=useState('');
  const[txStatus,setTxStatus]=useState('sold');
  const[txItems,setTxItems]=useState([]);
  const[selPid,setSelPid]=useState('');
  const[selQty,setSelQty]=useState(1);
  const[selPrice,setSelPrice]=useState(0);

  const onSelProd=id=>{setSelPid(id);const p=P.find(x=>x.id===id);if(p)setSelPrice(txType==='sale'?p.sellPrice:p.buyPrice)};
  const addTxItem=()=>{
    if(!selPid){toast('اختر منتجاً','err');return}
    const qty=+selQty;if(qty<1){toast('الكمية 1+','err');return}
    const p=P.find(x=>x.id===selPid);if(!p)return;
    if(txType==='sale'&&p.qty<qty){toast(`المتوفر ${p.qty} فقط`,'err');return}
    setTxItems(prev=>{
      const ex=prev.find(i=>i.productId===selPid);
      if(ex){const nq=ex.qty+qty;if(txType==='sale'&&p.qty<nq){toast('الكمية تتجاوز المتوفر','err');return prev}return prev.map(i=>i.productId===selPid?{...i,qty:nq}:i)}
      return[...prev,{productId:selPid,qty,unitPrice:+selPrice,pname:p.name,buyPrice:p.buyPrice}];
    });
    setSelPid('');setSelQty(1);setSelPrice(0);
  };

  const saveTx=async()=>{
    if(txItems.length===0){toast('أضف منتجاً على الأقل','err');return}
    setBusy(true);
    try{
      await fsAdd(COLS.transactions,{type:txType,customerId:txCustomer||null,date:txDate,note:txNote,status:txType==='sale'?txStatus:'available',items:txItems});
      for(const item of txItems){const p=P.find(x=>x.id===item.productId);if(p)await fsUp(COLS.products,item.productId,{qty:txType==='sale'?Math.max(0,p.qty-item.qty):p.qty+item.qty})}
      setModal(false);setTxItems([]);setTxCustomer('');setTxNote('');setTxStatus('sold');setTxType('sale');setTxDate(today());setSelPid('');setSelQty(1);setSelPrice(0);
      toast(txType==='sale'?'✅ تم تسجيل البيع':'✅ تم تسجيل الشراء','ok');
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };

  const saveEdit=async()=>{
    setBusy(true);
    try{
      const orig=T.find(x=>x.id===editModal.id);
      await fsUp(COLS.transactions,editModal.id,{status:editModal.status,note:editModal.note||'',date:editModal.date});
      if(orig&&orig.status!=='returned'&&editModal.status==='returned'){for(const item of(orig.items||[])){const p=P.find(x=>x.id===item.productId);if(p)await fsUp(COLS.products,item.productId,{qty:p.qty+item.qty})}}
      if(orig&&orig.status==='returned'&&editModal.status!=='returned'){for(const item of(orig.items||[])){const p=P.find(x=>x.id===item.productId);if(p)await fsUp(COLS.products,item.productId,{qty:Math.max(0,p.qty-item.qty)})}}
      setEditModal(null);toast('✅ تم التعديل','ok');
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };

  const delTx=async t=>{
    setBusy(true);
    try{
      if(t.type==='sale'&&t.status!=='returned'){for(const item of(t.items||[])){const p=P.find(x=>x.id===item.productId);if(p)await fsUp(COLS.products,item.productId,{qty:p.qty+item.qty})}}
      await fsDel(COLS.transactions,t.id);toast('تم الحذف');setConfirm(null);
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };

  const list=T.filter(t=>(filter==='all'||t.type===filter)&&(stFilter==='all'||t.status===stFilter)).slice().reverse();
  const txTot=t=>(t.items||[]).reduce((s,i)=>s+i.qty*i.unitPrice,0);
  const txProfit=t=>(t.items||[]).reduce((s,i)=>s+i.qty*(i.unitPrice-(i.buyPrice||0)),0);
  const grandTot=txItems.reduce((s,i)=>s+i.qty*i.unitPrice,0);

  return h('div',null,
    h('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}},
      h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
        ['all','sale','purchase'].map(f=>h('button',{key:f,className:`btn ${filter===f?'bp':'bo'} bsm`,onClick:()=>setFilter(f)},f==='all'?'الكل':f==='sale'?'📤 مبيعات':'📥 مشتريات')),
        h('select',{className:'fsel',value:stFilter,onChange:e=>setStFilter(e.target.value)},
          h('option',{value:'all'},'كل الحالات'),h('option',{value:'sold'},'مباع'),h('option',{value:'returned'},'مُرجَّع'),h('option',{value:'available'},'متوفر'),h('option',{value:'not_delivered'},'غير موصل'),h('option',{value:'delivered'},'تم التوصيل')
        )
      ),
      h('button',{className:'btn bp',onClick:()=>{setTxItems([]);setTxCustomer('');setTxNote('');setTxStatus('sold');setTxType('sale');setTxDate(today());setSelPid('');setSelQty(1);setSelPrice(0);setModal(true)}},'➕ معاملة جديدة')
    ),
    h('div',{className:'tw'},
      h('table',null,
        h('thead',null,h('tr',null,['النوع','العميل','المنتجات','الإجمالي','الربح','الحالة','التاريخ','إجراء'].map(c=>h('th',{key:c},c)))),
        h('tbody',null,list.length===0
          ?h('tr',null,h('td',{colSpan:8},h('div',{className:'empty'},h('div',{className:'ei'},'💳'),'لا توجد معاملات')))
          :list.map(t=>{
            const cu=C.find(x=>x.id===t.customerId);
            const items=t.items||[];
            const tot=txTot(t);const prof=t.type==='sale'?txProfit(t):null;
            return h('tr',{key:t.id},
              h('td',null,h('span',{className:`badge ${t.type==='sale'?'bg':'bb'}`},t.type==='sale'?'بيع':'شراء')),
              h('td',null,cu?.name||'-'),
              h('td',null,h('button',{className:'btn bsm bb',onClick:()=>setDetailModal(t),style:{fontSize:'12px'}},`${items.length} منتج — تفاصيل`)),
              h('td',null,'IQD '+fmtN(tot)),
              h('td',null,prof!==null?h('span',{className:prof>=0?'ppos':'pneg'},'IQD '+fmtN(prof)):'-'),
              h('td',null,t.status?h('span',{className:`badge ${STATUS_C[t.status]||'bb'}`},STATUS_L[t.status]||t.status):'-'),
              h('td',null,fmtD(t.date)),
              h('td',null,h('div',{style:{display:'flex',gap:'5px'}},
                h('button',{className:'bicon',onClick:()=>setEditModal({...t})},'✏️'),
                h('button',{className:'bicon',style:{color:'var(--err)'},onClick:()=>setConfirm(t)},'🗑️')
              ))
            );
          })
        )
      )
    ),
    detailModal&&h(Modal,{title:'تفاصيل المعاملة',onClose:()=>setDetailModal(null)},
      h('div',{style:{display:'flex',gap:'8px',marginBottom:'8px',flexWrap:'wrap'}},
        h('span',{className:`badge ${detailModal.type==='sale'?'bg':'bb'}`},detailModal.type==='sale'?'بيع':'شراء'),
        detailModal.status&&h('span',{className:`badge ${STATUS_C[detailModal.status]||'bb'}`},STATUS_L[detailModal.status]||detailModal.status),
        h('span',{style:{fontSize:'13px',color:'var(--g500)'}},fmtD(detailModal.date))
      ),
      C.find(x=>x.id===detailModal.customerId)&&h('p',{style:{fontSize:'14px',marginBottom:'8px'}},'👤 العميل: ',h('strong',null,C.find(x=>x.id===detailModal.customerId)?.name)),
      detailModal.note&&h('p',{style:{fontSize:'13px',color:'var(--g500)',marginBottom:'8px'}},'📝 ',detailModal.note),
      h('div',{className:'item-list'},
        (detailModal.items||[]).map(item=>{
          const p=P.find(x=>x.id===item.productId);
          const prof=detailModal.type==='sale'?item.qty*(item.unitPrice-(item.buyPrice||p?.buyPrice||0)):null;
          return h('div',{key:item.productId,className:'item-row',style:{flexDirection:'column',alignItems:'flex-start',gap:'4px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',width:'100%'}},
              h('span',{style:{fontWeight:700}},item.pname||p?.name||'-'),
              h('span',{style:{color:'var(--pri)',fontWeight:700}},'IQD '+fmtN(item.qty*item.unitPrice))
            ),
            h('div',{style:{display:'flex',gap:'12px',fontSize:'12px',color:'var(--g500)'}},
              h('span',null,'الكمية: ',item.qty),
              h('span',null,'السعر: IQD '+fmtN(item.unitPrice)),
              prof!==null&&h('span',{className:prof>=0?'ppos':'pneg'},'الربح: IQD '+fmtN(prof))
            )
          );
        }),
        h('div',{className:'item-total'},h('span',null,'الإجمالي'),h('span',null,'IQD '+fmtN(txTot(detailModal)))),
        detailModal.type==='sale'&&h('div',{style:{display:'flex',justifyContent:'space-between',padding:'9px 12px',fontWeight:700,fontSize:'14px',background:'var(--ok-l)',color:'var(--ok)'}},
          h('span',null,'إجمالي الربح'),h('span',null,'IQD '+fmtN(txProfit(detailModal)))
        )
      )
    ),
    modal&&h(Modal,{title:'معاملة جديدة',onClose:()=>setModal(false),
      footer:h(Fragment,null,h('button',{className:'btn bp',onClick:saveTx,disabled:busy||txItems.length===0},busy?'...':'💾 حفظ'),h('button',{className:'btn bo',onClick:()=>setModal(false)},'إلغاء'))
    },
      h('div',{className:'fr'},
        h('div',{className:'fg'},
          h('label',null,'نوع المعاملة'),
          h('select',{value:txType,onChange:e=>{setTxType(e.target.value);setTxItems([]);setSelPid('');setSelPrice(0)},style:{width:'100%',padding:'10px 14px',border:'1.5px solid var(--g200)',borderRadius:'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'14px'}},
            h('option',{value:'sale'},'📤 بيع'),h('option',{value:'purchase'},'📥 شراء')
          )
        ),
        txType==='sale'&&h('div',{className:'fg'},

// ══ RESERVATIONS — حجز متعدد المنتجات + ينزل من المخزون فوراً ══
function Reservations({reservations:R,products:P,customers:C}){
  R=R||[];P=P||[];C=C||[];
  const[modal,setModal]=useState(false);
  const[confirm,setConfirm]=useState(null);
  const[busy,setBusy]=useState(false);
  const[filter,setFilter]=useState('active');
  const[resCustomer,setResCustomer]=useState('');
  const[resNote,setResNote]=useState('');
  const[resDate,setResDate]=useState(today());
  const[resItems,setResItems]=useState([]);
  const[selPid,setSelPid]=useState('');
  const[selQty,setSelQty]=useState(1);

  const list=R.filter(r=>filter==='all'||r.status===filter).slice().reverse();

  const addResItem=()=>{
    if(!selPid){toast('اختر منتجاً','err');return}
    const qty=+selQty;if(qty<1){toast('الكمية 1+','err');return}
    const p=P.find(x=>x.id===selPid);if(!p)return;
    if(p.qty<qty){toast(`المتوفر من "${p.name}" هو ${p.qty} فقط`,'err');return}
    setResItems(prev=>{
      const ex=prev.find(i=>i.productId===selPid);
      if(ex){const nq=ex.qty+qty;if(p.qty<nq){toast('الكمية تتجاوز المتوفر','err');return prev}return prev.map(i=>i.productId===selPid?{...i,qty:nq}:i)}
      return[...prev,{productId:selPid,qty,pname:p.name,sellPrice:p.sellPrice,buyPrice:p.buyPrice}];
    });
    setSelPid('');setSelQty(1);
  };
  const removeResItem=pid=>setResItems(prev=>prev.filter(i=>i.productId!==pid));

  const openAdd=()=>{setResCustomer('');setResNote('');setResDate(today());setResItems([]);setSelPid('');setSelQty(1);setModal(true)};

  // الحجز ينزل من المخزون فوراً عند الحفظ
  const save=async()=>{
    if(!resCustomer){toast('اختر العميل','err');return}
    if(resItems.length===0){toast('أضف منتجاً على الأقل','err');return}
    setBusy(true);
    try{
      // تحقق من توفر الكميات
      for(const item of resItems){
        const p=P.find(x=>x.id===item.productId);
        if(!p||p.qty<item.qty){toast(`المنتج "${item.pname}" غير متوفر بالكمية المطلوبة (متاح: ${p?.qty||0})`,'err');setBusy(false);return}
      }
      const c=C.find(x=>x.id===resCustomer);
      await fsAdd(COLS.reservations,{customerId:resCustomer,customerName:c?.name||'',items:resItems,note:resNote||'',date:resDate,status:'active'});
      // ينزل من المخزون فوراً
      for(const item of resItems){
        const p=P.find(x=>x.id===item.productId);
        if(p)await fsUp(COLS.products,item.productId,{qty:Math.max(0,p.qty-item.qty)});
      }
      setModal(false);
      toast('✅ تم الحجز ونزلت الكميات من المخزون','ok');
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };

  // عند الاستلام — يتحول لبيع فقط (الكميات نزلت بالفعل عند الحجز)
  const complete=async r=>{
    setBusy(true);
    try{
      const items=r.items||[];
      const txItems=items.map(item=>{
        const p=P.find(x=>x.id===item.productId);
        return{productId:item.productId,qty:item.qty,unitPrice:item.sellPrice||p?.sellPrice||0,pname:item.pname,buyPrice:item.buyPrice||p?.buyPrice||0};
      });
      await fsAdd(COLS.transactions,{type:'sale',customerId:r.customerId,date:today(),note:'تحويل من حجز'+(r.note?' — '+r.note:''),status:'sold',items:txItems});
      // لا نغير المخزون هنا لأنه نزل بالفعل عند الحجز
      await fsUp(COLS.reservations,r.id,{status:'completed',completedDate:today()});
      toast('✅ تم إتمام الحجز وتسجيل البيع','ok');
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };

  // عند إلغاء الحجز — يرجع الكميات للمخزون
  const cancel=async r=>{
    setBusy(true);
    try{
      for(const item of(r.items||[])){
        const p=P.find(x=>x.id===item.productId);
        if(p)await fsUp(COLS.products,item.productId,{qty:p.qty+item.qty});
      }
      await fsUp(COLS.reservations,r.id,{status:'cancelled'});
      toast('تم إلغاء الحجز وأُعيدت الكميات للمخزون');setConfirm(null);
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };

  const resTot=r=>(r.items||[]).reduce((s,i)=>s+i.qty*(i.sellPrice||0),0);

  return h('div',null,
    h('div',{className:'al al-or'},'🔖 الحجز ينزل من المخزون فوراً — عند الاستلام يتسجل كبيع — عند الإلغاء يرجع للمخزون'),
    h('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}},
      h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
        ['active','completed','cancelled','all'].map(f=>h('button',{key:f,className:`btn ${filter===f?'bp':'bo'} bsm`,onClick:()=>setFilter(f)},
          f==='active'?'🟠 نشط':f==='completed'?'✅ مكتمل':f==='cancelled'?'❌ ملغي':'الكل'
        ))
      ),
      h('button',{className:'btn bp',onClick:openAdd},'➕ حجز جديد')
    ),
    list.length===0
      ?h('div',{className:'empty'},h('div',{className:'ei'},'🔖'),'لا توجد حجوزات')
      :list.map(r=>{
        const c=C.find(x=>x.id===r.customerId);
        const items=r.items||[];
        return h('div',{key:r.id,className:'res-card'},
          h('div',{className:'res-card-head'},
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}},
                h('div',{className:'av',style:{width:'32px',height:'32px',fontSize:'13px'}},r.customerName?.[0]||'؟'),
                h('div',{className:'res-card-title'},r.customerName||c?.name||'-')
              ),
              h('div',{className:'res-card-sub'},'📦 ',items.length,' قطعة — إجمالي: IQD '+fmtN(resTot(r))),
              r.note&&h('div',{className:'res-card-sub'},'📝 ',r.note),
              h('div',{className:'res-card-sub'},'📅 ',fmtD(r.date))
            ),
            h('div',{className:'res-actions'},
              h('span',{className:`badge ${r.status==='active'?'bor':r.status==='completed'?'bg':'br'}`},
                r.status==='active'?'🟠 نشط':r.status==='completed'?'✅ مكتمل':'❌ ملغي'
              )
            )
          ),
          h('div',{className:'item-list',style:{marginBottom:'8px'}},
            items.map(item=>h('div',{key:item.productId,className:'item-row'},
              h('span',null,h('strong',null,item.pname),' × ',item.qty),
              h('span',{style:{color:'var(--pri)',fontWeight:700,fontSize:'13px'}},'IQD '+fmtN(item.qty*(item.sellPrice||0)))
            )),
            h('div',{className:'item-total'},h('span',null,'الإجمالي'),h('span',null,'IQD '+fmtN(resTot(r))))
          ),
          r.status==='active'&&h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
            h('button',{className:'btn bok bsm',onClick:()=>complete(r),disabled:busy},'✅ وصلت — تسجيل كبيع'),
            h('button',{className:'btn be bsm',onClick:()=>setConfirm(r),disabled:busy},'❌ إلغاء الحجز')
          )
        );
      }),
    modal&&h(Modal,{title:'حجز جديد',onClose:()=>setModal(false),
      footer:h(Fragment,null,
        h('button',{className:'btn bp',onClick:save,disabled:busy||resItems.length===0},busy?'...':'💾 حفظ الحجز'),
        h('button',{className:'btn bo',onClick:()=>setModal(false)},'إلغاء')
      )
    },
      h('div',{className:'fg'},h('label',null,'العميل *'),h(CustomerSearch,{customers:C,value:resCustomer,onChange:setResCustomer})),
      h('div',{className:'fr'},
        h('div',{className:'fg'},h('label',null,'تاريخ الحجز'),h('input',{type:'date',value:resDate,onChange:e=>setResDate(e.target.value)})),
        h('div',{className:'fg'},h('label',null,'ملاحظة'),h('input',{value:resNote,onChange:e=>setResNote(e.target.value),placeholder:'اختياري'}))
      ),
      h('div',{className:'divider'},
        h('div',{style:{fontWeight:700,fontSize:'14px',color:'var(--g700)',marginBottom:'10px'}},'📦 القطع المراد حجزها'),
        h('div',{className:'fg'},h('label',null,'ابحث عن منتج'),h(ProductSearch,{products:P,value:selPid,onChange:setSelPid,placeholder:'اكتب اسم المنتج...'})),
        h('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'10px'}},
          h('div',{style:{width:'90px'}},
            h('label',{style:{fontSize:'12px',color:'var(--g500)',display:'block',marginBottom:'4px'}},'الكمية'),
            h('input',{type:'number',min:1,value:selQty,onChange:e=>setSelQty(e.target.value),style:{width:'100%',padding:'9px 8px',border:'1.5px solid var(--g200)',borderRadius:'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'13px',textAlign:'center'}})
          ),
          h('button',{className:'btn bp bsm',onClick:addResItem,style:{paddingTop:'10px',paddingBottom:'10px',flex:1}},'+ أضف للحجز')
        ),
        resItems.length>0
          ?h('div',{className:'item-list'},
            resItems.map(item=>h('div',{key:item.productId,className:'item-row'},
              h('span',null,h('strong',null,item.pname),' × ',item.qty),
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('span',{style:{color:'var(--orange)',fontWeight:700}},'IQD '+fmtN(item.qty*(item.sellPrice||0))),
                h('button',{className:'bicon',style:{padding:'3px 6px',color:'var(--err)',fontSize:'12px'},onClick:()=>removeResItem(item.productId)},'✕')
              )
            )),
            h('div',{className:'item-total',style:{background:'var(--orange-l)',color:'var(--orange)'}},
              h('span',null,'إجمالي الحجز'),h('span',null,'IQD '+fmtN(resItems.reduce((s,i)=>s+i.qty*(i.sellPrice||0),0)))
            )
          )
          :h('p',{style:{fontSize:'12px',color:'var(--g400)',textAlign:'center',padding:'8px'}},'لم تُضف قطع بعد')
      ),
      h('div',{className:'al al-or'},'⚠️ الكميات ستنزل من المخزون فوراً عند حفظ الحجز')
    ),
    confirm&&h(Confirm,{msg:'هل تريد إلغاء هذا الحجز؟ ستُعاد الكميات للمخزون تلقائياً.',busy,onOk:()=>cancel(confirm),onCancel:()=>setConfirm(null)})
  );
}

// ══ DAILY REPORTS — تقارير يومية شاملة ══
function DailyReports({transactions:T,products:P,customers:C}){
  T=T||[];P=P||[];C=C||[];
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');
  const[expanded,setExpanded]=useState({});
  const toggle=d=>setExpanded(p=>({...p,[d]:!p[d]}));

  // فلترة حسب التاريخ
  const sales=T.filter(t=>t.type==='sale'&&t.status!=='returned');
  const filtered=sales.filter(t=>{
    if(dateFrom&&t.date<dateFrom)return false;
    if(dateTo&&t.date>dateTo)return false;
    return true;
  });

  // تجميع حسب اليوم
  const dayMap={};
  filtered.forEach(t=>{
    const d=t.date||'—';
    if(!dayMap[d])dayMap[d]={date:d,transactions:[],total:0,profit:0,itemCount:0,products:{}};
    const tot=(t.items||[]).reduce((s,i)=>s+i.qty*i.unitPrice,0);
    const prof=(t.items||[]).reduce((s,i)=>s+i.qty*(i.unitPrice-(i.buyPrice||0)),0);
    dayMap[d].transactions.push(t);
    dayMap[d].total+=tot;
    dayMap[d].profit+=prof;
    (t.items||[]).forEach(i=>{
      dayMap[d].itemCount+=i.qty;
      if(!dayMap[d].products[i.productId])dayMap[d].products[i.productId]={pname:i.pname||'—',qty:0,revenue:0};
      dayMap[d].products[i.productId].qty+=i.qty;
      dayMap[d].products[i.productId].revenue+=i.qty*i.unitPrice;
    });
  });

  const days=Object.values(dayMap).sort((a,b)=>b.date.localeCompare(a.date));
  const grandTotal=days.reduce((s,d)=>s+d.total,0);
  const grandProfit=days.reduce((s,d)=>s+d.profit,0);
  const grandItems=days.reduce((s,d)=>s+d.itemCount,0);

  return h('div',null,
    h('div',{className:'al al-i'},'📅 تقرير شامل بكل يوم — شنو انباع وبكم — مرتب من الأحدث للأقدم'),
    // فلتر التاريخ
    h('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem',flexWrap:'wrap',alignItems:'flex-end'}},
      h('div',{className:'fg',style:{margin:0,flex:1,minWidth:'140px'}},
        h('label',{style:{fontSize:'12px',fontWeight:600,color:'var(--g700)',display:'block',marginBottom:'4px'}},'من تاريخ'),
        h('input',{type:'date',value:dateFrom,onChange:e=>setDateFrom(e.target.value),style:{width:'100%',padding:'9px 12px',border:'1.5px solid var(--g200)',borderRadius:'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'13px'}})
      ),
      h('div',{className:'fg',style:{margin:0,flex:1,minWidth:'140px'}},
        h('label',{style:{fontSize:'12px',fontWeight:600,color:'var(--g700)',display:'block',marginBottom:'4px'}},'إلى تاريخ'),
        h('input',{type:'date',value:dateTo,onChange:e=>setDateTo(e.target.value),style:{width:'100%',padding:'9px 12px',border:'1.5px solid var(--g200)',borderRadius:'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'13px'}})
      ),
      h('button',{className:'btn bo bsm',onClick:()=>{setDateFrom('');setDateTo('')}},'🔄 إعادة تعيين')
    ),
    // بطاقات الإجماليات
    h('div',{className:'sgrid',style:{marginBottom:'1rem'}},
      h('div',{className:'sc'},h('div',{className:'sic',style:{background:'#EFF6FF'}},'📅'),h('div',{className:'sl'},'عدد الأيام'),h('div',{className:'sv'},days.length)),
      h('div',{className:'sc'},h('div',{className:'sic',style:{background:'#dcfce7'}},'📦'),h('div',{className:'sl'},'قطع مباعة'),h('div',{className:'sv'},fmtN(grandItems))),
      h('div',{className:'sc'},h('div',{className:'sic',style:{background:'#EFF6FF'}},'💰'),h('div',{className:'sl'},'إجمالي المبيعات'),h('div',{className:'sv',style:{fontSize:'14px'}},'IQD '+fmtN(grandTotal))),
      h('div',{className:'sc'},h('div',{className:'sic',style:{background:'#dcfce7'}},'📈'),h('div',{className:'sl'},'إجمالي الأرباح'),h('div',{className:'sv',style:{fontSize:'14px',color:grandProfit>=0?'var(--ok)':'var(--err)'}},'IQD '+fmtN(grandProfit)))
    ),
    // قائمة الأيام
    days.length===0
      ?h('div',{className:'empty'},h('div',{className:'ei'},'📅'),'لا توجد مبيعات في هذه الفترة')
      :days.map(day=>h('div',{key:day.date,className:'card',style:{marginBottom:'0.75rem',border:expanded[day.date]?'2px solid var(--pri)':'1px solid var(--g200)'}},
        // رأس اليوم — قابل للنقر
        h('div',{onClick:()=>toggle(day.date),style:{cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
            h('span',{style:{fontSize:'18px'}},expanded[day.date]?'📂':'📁'),
            h('div',null,
              h('div',{style:{fontWeight:800,fontSize:'15px',color:'var(--g800)'}},
                new Date(day.date+'T00:00:00').toLocaleDateString('ar-IQ',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
              ),
              h('div',{style:{fontSize:'12px',color:'var(--g500)',marginTop:'2px'}},`${day.transactions.length} معاملة — ${fmtN(day.itemCount)} قطعة`)
            )
          ),
          h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
            h('span',{className:'badge bb'},'💰 '+fmtN(day.total)+' IQD'),
            h('span',{className:'badge '+(day.profit>=0?'bg':'br')},'📈 '+fmtN(day.profit)+' IQD')
          )
        ),
        // التفاصيل (تنبسط)
        expanded[day.date]&&h('div',{style:{marginTop:'1rem'}},
          // ملخص المنتجات المباعة هذا اليوم
          h('div',{style:{fontWeight:700,fontSize:'13px',color:'var(--g700)',marginBottom:'6px'}},'📦 المنتجات المباعة هذا اليوم:'),
          h('div',{className:'item-list',style:{marginBottom:'1rem'}},
            Object.values(day.products).sort((a,b)=>b.qty-a.qty).map((pr,i)=>h('div',{key:i,className:'item-row'},
              h('span',null,h('strong',null,pr.pname),' × ',fmtN(pr.qty)),
              h('span',{style:{color:'var(--pri)',fontWeight:700}},'IQD '+fmtN(pr.revenue))
            )),
            h('div',{className:'item-total'},h('span',null,'إجمالي اليوم'),h('span',null,'IQD '+fmtN(day.total)))
          ),
          // جدول المعاملات التفصيلية
          h('div',{style:{fontWeight:700,fontSize:'13px',color:'var(--g700)',marginBottom:'6px'}},'💳 تفاصيل المعاملات:'),
          h('div',{className:'tw'},
            h('table',null,
              h('thead',null,h('tr',null,['العميل','المنتجات','الإجمالي','الربح','الحالة','ملاحظة'].map(c=>h('th',{key:c},c)))),
              h('tbody',null,day.transactions.map(t=>{
                const cu=C.find(x=>x.id===t.customerId);
                const tot=(t.items||[]).reduce((s,i)=>s+i.qty*i.unitPrice,0);
                const prof=(t.items||[]).reduce((s,i)=>s+i.qty*(i.unitPrice-(i.buyPrice||0)),0);
                return h('tr',{key:t.id},
                  h('td',null,cu?.name||h('span',{style:{color:'var(--g400)'}},'—')),
                  h('td',null,h('div',null,(t.items||[]).map((item,j)=>h('div',{key:j,style:{fontSize:'12px',color:'var(--g600)',lineHeight:'1.6'}},`${item.pname||'—'} × ${item.qty}`)))),
                  h('td',null,'IQD '+fmtN(tot)),
                  h('td',null,h('span',{className:prof>=0?'ppos':'pneg'},'IQD '+fmtN(prof))),
                  h('td',null,t.status?h('span',{className:`badge ${STATUS_C[t.status]||'bb'}`,style:{fontSize:'11px'}},STATUS_L[t.status]||t.status):'-'),
                  h('td',null,h('span',{style:{fontSize:'12px',color:'var(--g500)'}},t.note||'—'))
                );
              }))
            )
          )
        )
      ))
  );
}

// ══ EMPLOYEES ══
function Employees({users:U}){
  U=U||[];
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[busy,setBusy]=useState(false);
  const[form,setForm]=useState({name:'',email:'',password:'',role:'employee',phone:''});
  const oAdd=()=>{setForm({name:'',email:'',password:'',role:'employee',phone:''});setModal('add')};
  const oEdit=u=>{setForm({...u});setModal('edit')};
  const save=async()=>{
    if(!form.name||!form.email){toast('يرجى تعبئة الحقول المطلوبة','err');return}
    setBusy(true);
    try{
      const d={name:form.name,email:form.email,password:form.password||'',role:form.role,phone:form.phone||''};
      if(modal==='add'){await fsAdd(COLS.users,d);toast('✅ تم الإضافة','ok')}
      else{await fsSet(COLS.users,form.id,d);toast('✅ تم التعديل','ok')}
      setModal(null);
    }catch(e){toast('خطأ: '+e.message,'err')}
    setBusy(false);
  };
  const del=async id=>{setBusy(true);try{await fsDel(COLS.users,id);toast('تم الحذف');setConfirm(null)}catch(e){toast('خطأ: '+e.message,'err')}setBusy(false)};
  return h('div',null,
    h('div',{className:'al al-i'},'🔄 أي تغيير يظهر فوراً لجميع الأجهزة'),
    h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:'1rem'}},h('button',{className:'btn bp',onClick:oAdd},'➕ موظف')),
    h('div',{className:'tw'},
      h('table',null,
        h('thead',null,h('tr',null,['الموظف','البريد','الهاتف','الصلاحية','إجراء'].map(c=>h('th',{key:c},c)))),
        h('tbody',null,U.map(u=>h('tr',{key:u.id},
          h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'9px'}},
            h('div',{className:'av',style:{width:'36px',height:'36px',fontSize:'15px',background:u.role==='admin'?'var(--purple)':'var(--pri)'}},u.name?.[0]||'؟'),
            h('span',{style:{fontWeight:700}},u.name)
          )),
          h('td',null,u.email),h('td',null,u.phone||'-'),
          h('td',null,h('span',{className:`chip ${u.role==='admin'?'ca':'ce'}`},u.role==='admin'?'👑 مدير':'👔 موظف')),
          h('td',null,h('div',{style:{display:'flex',gap:'5px'}},
            h('button',{className:'bicon',onClick:()=>oEdit(u)},'✏️'),
            h('button',{className:'bicon',style:{color:'var(--err)'},onClick:()=>setConfirm(u.id)},'🗑️')
          ))
        )))
      )
    ),
    modal&&h(Modal,{title:modal==='add'?'إضافة موظف':'تعديل موظف',onClose:()=>setModal(null),
      footer:h(Fragment,null,h('button',{className:'btn bp',onClick:save,disabled:busy},busy?'...':'💾 حفظ'),h('button',{className:'btn bo',onClick:()=>setModal(null)},'إلغاء'))
    },
      h('div',{className:'fr'},
        h('div',{className:'fg'},h('label',null,'الاسم *'),h('input',{value:form.name,onChange:e=>setForm(p=>({...p,name:e.target.value})),autoFocus:true})),
        h('div',{className:'fg'},h('label',null,'الهاتف'),h('input',{value:form.phone||'',onChange:e=>setForm(p=>({...p,phone:e.target.value})),type:'tel'}))
      ),
      h('div',{className:'fg'},h('label',null,'البريد *'),h('input',{type:'email',value:form.email,onChange:e=>setForm(p=>({...p,email:e.target.value}))})),
      h('div',{className:'fr'},
        h('div',{className:'fg'},h('label',null,'كلمة المرور'),h('input',{type:'password',value:form.password||'',onChange:e=>setForm(p=>({...p,password:e.target.value})),placeholder:'••••••••'})),
        h('div',{className:'fg'},
          h('label',null,'الصلاحية'),
          h('select',{value:form.role,onChange:e=>setForm(p=>({...p,role:e.target.value})),style:{width:'100%',padding:'10px 14px',border:'1.5px solid var(--g200)',borderRadius:'var(--r)',fontFamily:'Tajawal,sans-serif',fontSize:'14px'}},
            h('option',{value:'employee'},'موظف'),h('option',{value:'admin'},'مدير')
          )
        )
      )
    ),
    confirm&&h(Confirm,{msg:'هل تريد حذف هذا الموظف؟',busy,onOk:()=>del(confirm),onCancel:()=>setConfirm(null)})
  );
}

// ══ MAIN APP ══
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[online,setOnline]=useState(navigator.onLine);
  const[seeded,setSeeded]=useState(false);

  const products=useCol(COLS.products);
  const customers=useCol(COLS.customers);
  const transactions=useCol(COLS.transactions);
  const users=useCol(COLS.users);
  const reservations=useCol(COLS.reservations);

  useEffect(()=>{if(!seeded){seed().then(()=>setSeeded(true)).catch(console.error)}},[]);
  useEffect(()=>{
    const on=()=>setOnline(true),off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off)};
  },[]);

  const loading=!products||!customers||!transactions||!users||!reservations;
  if(loading)return h('div',{className:'loader'},h('div',{className:'loader-box'},h('div',{className:'spin'}),h('h3',null,'جاري الاتصال بـ Firebase'),h('p',null,'يتم تحميل البيانات...')));
  if(!user)return h(Auth,{users,onLogin:u=>{setUser(u);setPage('dashboard')}});

  const lowStockCount=(products||[]).filter(p=>p.qty<=5).length;
  const activeRes=(reservations||[]).filter(r=>r.status==='active').length;
  const labels={dashboard:'لوحة التحكم',products:'المنتجات',customers:'العملاء',transactions:'المعاملات',reservations:'الحجوزات',reports:'📅 تقارير يومية',employees:'الموظفون'};

  return h('div',{className:'layout'},
    h(Sidebar,{user,page,setPage,open:sidebarOpen,onClose:()=>setSidebarOpen(false),online}),
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          h('button',{className:'mtog',onClick:()=>setSidebarOpen(o=>!o)},'☰'),
          h('h2',null,labels[page]||'')
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          lowStockCount>0&&h('span',{className:'badge by'},`⚠️ ${lowStockCount}`),
          activeRes>0&&h('span',{className:'badge bor'},`🔖 ${activeRes}`),
          h('div',{className:'av',style:{width:'32px',height:'32px',fontSize:'13px',background:user.role==='admin'?'var(--purple)':'var(--pri)'}},user.name[0]),
          h('button',{className:'bicon',onClick:()=>{setUser(null);setPage('dashboard')},title:'خروج'},'🚪')
        )
      ),
      h('div',{className:'pcontent'},
        page==='dashboard'&&h(Dashboard,{products,transactions,customers,reservations}),
        page==='products'&&h(Products,{products,user}),
        page==='customers'&&h(Customers,{customers,transactions,products}),
        page==='transactions'&&h(Transactions,{transactions,products,customers}),
        page==='reservations'&&h(Reservations,{reservations,products,customers}),
        page==='reports'&&h(DailyReports,{transactions,products,customers}),
        page==='employees'&&user.role==='admin'&&h(Employees,{users})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
